{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <title>Anime Details for {{anime.name}}</title>
        <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    </head>
    <body>
        <h1>Anime Search</h1>
        <div class="anime-grid">
            {% if anime %}
            <div class="anime-card">
                <div class="card-header">
                    <h3 class="anime-title">{{ anime.name }}</h3>
                    <span class="anime-type">{{ anime.type }}</span>
                </div>
                
                <div class="card-body">
                    <div class="info-row">
                        <span class="info-label">Genre:</span>
                        <span class="info-value">{{ anime.genre }}</span>
                    </div>
                    
                    <div class="info-row">
                        <span class="info-label">Episodes:</span>
                        <span class="info-value">{{ anime.episodes }}</span>
                    </div>
                    
                    <div class="info-row">
                        <span class="info-label">Rating:</span>
                        <span class="info-value rating">⭐ {{ anime.rating }}</span>
                    </div>
                    
                    <div class="info-row">
                        <span class="info-label">Members:</span>
                        <span class="info-value">{{ anime.members|stringformat:"d" }}</span>
                    </div>
                </div>
                <form action="{% url 'search_bar' %}" method="get">
                    <input type="submit" style="background-color:#2ecc71; color:white; border:none; padding:6px 12px; border-radius:4px; font-size:14px; cursor:pointer;" value="Go to Home Page" />
                </form>
            </div>
            {% else %}
            <div class="no-results">
                <p>No anime records found.</p>
                <form action="{% url 'search_bar' %}" method="get">
                    <input type="submit" style="background-color:#2ecc71; color:white; border:none; padding:6px 12px; border-radius:4px; font-size:14px; cursor:pointer;" value="Go to Home Page" />
                </form>
            </div>
            {% endif %}
        </div>
    </body>
</html>
